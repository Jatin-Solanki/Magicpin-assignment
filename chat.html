<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vera AI Assistant</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ece5dd;
}

.header{
    background:#075e54;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.chat{
    height:calc(100vh - 130px);
    overflow-y:auto;
    padding:15px;
}

.bot,.user{
    max-width:75%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.bot{
    background:white;
}

.user{
    background:#dcf8c6;
    margin-left:auto;
}

.input-area{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:white;
    padding:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

button{
    margin-left:10px;
    padding:10px 20px;
    background:#25d366;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
🤖 Vera AI Assistant
</div>

<div class="chat" id="chat">
    <div class="bot">
        Hello! I'm Vera. Ask me anything.
    </div>
</div>

<div class="input-area">
    <input id="msg" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

    const input=document.getElementById("msg");
    const text=input.value.trim();

    if(!text) return;

    const chat=document.getElementById("chat");

    chat.innerHTML += `
      <div class="user">${text}</div>
    `;

    input.value="";

    try{

        const response=await fetch("/v1/reply",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                conversation_id:"web-demo",
                merchant_id:"demo",
                message:text
            })
        });

        const data=await response.json();

        chat.innerHTML += `
          <div class="bot">
             ${JSON.stringify(data,null,2)}
          </div>
        `;

        chat.scrollTop=chat.scrollHeight;

    }catch(err){

        chat.innerHTML += `
          <div class="bot">
             Error connecting to server
          </div>
        `;
    }
}

</script>

</body>
</html>
